<div class="flex flex-col h-full text-slate-200">
    <!-- Header Controls -->
    <div
        class="bg-aviationCard p-5 border-b border-aviationBorder flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <span
                class="bg-red-500/10 text-aviationRed border border-red-500/20 text-[10px] font-bold uppercase tracking-widest px-2.5 py-0.5 rounded-md font-mono">SMS-02</span>
            <h2 class="text-xl font-black text-white tracking-tight mt-1.5">Safety Operations Log</h2>
            <p class="text-xs text-slate-500 mt-0.5">Review and manage internal flight system observations</p>
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto">
            <!-- Search bar -->
            <div class="relative flex-1 md:w-80">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-slate-500 text-xs"></i>
                </span>
                <input type="text" id="reportSearch" placeholder="Search Location, ID, Aircraft..."
                    class="w-full bg-slate-950 border border-aviationBorder focus:ring-2 focus:ring-aviationRed focus:border-transparent text-white pl-9 pr-4 py-2 rounded-lg text-sm focus:outline-none transition-all placeholder-slate-700"
                    oninput="window.filterReports()">
            </div>
            <!-- Status Dropdown -->
            <select id="statusFilter" onchange="window.filterReports()"
                class="bg-slate-950 border border-aviationBorder text-white px-3 py-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-aviationRed focus:border-transparent transition-all cursor-pointer">
                <option value="All">All Statuses</option>
                <option value="Open">Open</option>
                <option value="Under Review">Under Review</option>
                <option value="Closed">Closed</option>
            </select>
        </div>
    </div>

    <!-- Main Workspace Split-Pane -->
    <div class="flex flex-col lg:flex-row flex-1 min-h-[550px] bg-slate-950">
        <!-- Left Side: List of Reports -->
        <div class="w-full lg:w-[38%] border-r border-aviationBorder/80 overflow-y-auto max-h-[calc(100vh-220px)] bg-slate-950/40"
            id="reportsList">
            <!-- Loading State -->
            <div class="p-8 text-center text-slate-500 flex flex-col items-center justify-center gap-3 h-48">
                <i class="fa-solid fa-circle-notch animate-spin text-aviationRed text-xl"></i>
                <p class="text-xs font-semibold tracking-wide font-mono">Loading safety reports database...</p>
            </div>
        </div>

        <!-- Right Side: Full Detail View -->
        <div class="flex-1 p-6 lg:p-8 overflow-y-auto max-h-[calc(100vh-220px)] bg-slate-950" id="reportDetail">
            <div class="flex flex-col items-center justify-center h-full text-slate-500 text-center py-12">
                <div
                    class="h-16 w-16 rounded-full bg-slate-900 border border-aviationBorder flex items-center justify-center mb-4">
                    <i class="fa-solid fa-shield-halved text-2xl text-slate-600"></i>
                </div>
                <h3 class="text-sm font-semibold text-slate-400">No Record Selected</h3>
                <p class="text-xs text-slate-500 max-w-xs mt-1">Select a safety report from the left-hand log panel to
                    view details and action items.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Self-contained, collision-safe view script
    (function () {
        let allReports = [];

        async function loadReports() {
            try {
                const response = await fetch('data/reports.json');
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

                allReports = await response.json();
                renderReportsList(allReports);
            } catch (error) {
                console.error("Error fetching reports:", error);
                const listContainer = document.getElementById('reportsList');
                if (listContainer) {
                    listContainer.innerHTML = `
                        <div class="p-8 text-center text-red-400 text-xs flex flex-col items-center justify-center gap-2">
                            <i class="fa-solid fa-triangle-exclamation text-xl mb-1 text-aviationRed"></i>
                            <span class="font-bold text-slate-300">Database Connection Failed</span>
                            <span class="text-[10px] text-slate-500 font-mono">${error.message}</span>
                        </div>
                    `;
                }
            }
        }

        function renderReportsList(reports) {
            const listContainer = document.getElementById('reportsList');
            if (!listContainer) return;

            if (reports.length === 0) {
                listContainer.innerHTML = `
                    <div class="p-8 text-center text-slate-600 text-xs font-semibold font-mono">No records match filter criteria.</div>
                `;
                return;
            }

            listContainer.innerHTML = reports.map(report => {
                let badgeStyle = "bg-orange-500/10 text-orange-400 border-orange-500/20";
                if (report.status === "Closed") badgeStyle = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                if (report.status === "Under Review") badgeStyle = "bg-blue-500/10 text-blue-400 border-blue-500/20";

                return `
                    <button onclick="window.selectReport('${report.id}')" id="card-${report.id}" 
                            class="w-full text-left p-4 hover:bg-slate-900/60 border-l-4 border-transparent transition-all duration-150 focus:outline-none block border-b border-aviationBorder/40">
                        <div class="flex justify-between items-center mb-1.5">
                            <span class="text-xs font-mono font-bold text-slate-500">#ID-${report.id}</span>
                            <span class="text-[9px] px-2 py-0.5 rounded border ${badgeStyle} uppercase font-bold tracking-wider">${report.status}</span>
                        </div>
                        <div class="text-sm font-bold text-white truncate mb-1">${report.location}</div>
                        <div class="text-[11px] text-slate-400 flex justify-between font-mono">
                            <span>${report.aircraft}</span>
                            <span>${report.eventDate}</span>
                        </div>
                    </button>
                `;
            }).join('');
        }

        // Clean up and bind to global context safely
        window.selectReport = function (id) {
            document.querySelectorAll('[id^="card-"]').forEach(c => {
                c.classList.remove('bg-slate-900/95', 'border-aviationRed');
                c.classList.add('border-transparent');
            });

            const activeCard = document.getElementById(`card-${id}`);
            if (activeCard) {
                activeCard.classList.add('bg-slate-900/95', 'border-aviationRed');
                activeCard.classList.remove('border-transparent');
            }

            const report = allReports.find(r => r.id === id);
            if (!report) return;

            let badgeStyle = "bg-orange-500/10 text-orange-400 border-orange-500/20";
            if (report.status === "Closed") badgeStyle = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
            if (report.status === "Under Review") badgeStyle = "bg-blue-500/10 text-blue-400 border-blue-500/20";

            const detailPane = document.getElementById('reportDetail');
            if (detailPane) {
                detailPane.innerHTML = `
                    <div class="animate-fadeIn">
                        <div class="border-b border-aviationBorder pb-5 mb-6">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                                <h3 class="text-lg font-black text-white tracking-tight">Event Log Detail</h3>
                                <span class="text-xs px-2.5 py-1 rounded border ${badgeStyle} uppercase font-bold tracking-wider">${report.status}</span>
                            </div>
                            
                            <!-- Balanced flexbox metadata grid -->
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-aviationCard p-4 rounded-xl border border-aviationBorder text-xs font-mono">
                                <div>
                                    <span class="block text-slate-500 uppercase font-bold tracking-wider mb-1 font-sans">Report ID</span>
                                    <span class="text-white font-medium">${report.id}</span>
                                </div>
                                <div>
                                    <span class="block text-slate-500 uppercase font-bold tracking-wider mb-1 font-sans">Aircraft</span>
                                    <span class="text-white font-medium break-words">${report.aircraft}</span>
                                </div>
                                <div>
                                    <span class="block text-slate-500 uppercase font-bold tracking-wider mb-1 font-sans">Classification</span>
                                    <span class="text-white font-medium break-words block">${report.classification}</span>
                                </div>
                                <div>
                                    <span class="block text-slate-500 uppercase font-bold tracking-wider mb-1 font-sans">Location</span>
                                    <span class="text-white font-medium break-words block">${report.location}</span>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div>
                                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 font-mono flex items-center gap-1.5">
                                    <i class="fa-solid fa-align-left text-aviationRed/70"></i> Narrative & Observation
                                </h4>
                                <p class="text-slate-300 text-sm leading-relaxed bg-aviationCard p-5 rounded-xl border border-aviationBorder italic">
                                    "${report.description}"
                                </p>
                            </div>

                            ${report.update ? `
                                <div class="bg-emerald-950/10 border border-emerald-500/20 rounded-xl p-5">
                                    <h4 class="text-xs font-bold text-emerald-400 flex items-center gap-1.5 mb-2.5 uppercase tracking-wider font-mono">
                                        <i class="fa-solid fa-circle-check"></i>
                                        Review Board Determination
                                    </h4>
                                    <p class="text-slate-300 text-sm leading-relaxed">${report.update}</p>
                                </div>
                            ` : ''}
                        </div>

                        <div class="mt-8 pt-4 border-t border-aviationBorder flex flex-col sm:flex-row justify-between text-[11px] text-slate-500 font-mono gap-2">
                            <span><strong>Submitted:</strong> ${report.submissionDate} by ${report.submittedBy}</span>
                            <span><strong>Last Mod:</strong> ${report.dateModified} by ${report.modifiedBy}</span>
                        </div>
                    </div>
                `;
            }
        };

        window.filterReports = function () {
            const searchInput = document.getElementById('reportSearch');
            const filterSelect = document.getElementById('statusFilter');
            if (!searchInput || !filterSelect) return;

            const query = searchInput.value.toLowerCase();
            const status = filterSelect.value;

            const filtered = allReports.filter(r => {
                const matchesSearch = r.id.toLowerCase().includes(query) ||
                    r.location.toLowerCase().includes(query) ||
                    r.aircraft.toLowerCase().includes(query) ||
                    r.description.toLowerCase().includes(query) ||
                    r.classification.toLowerCase().includes(query);

                const matchesStatus = (status === 'All') || (r.status === status);
                return matchesSearch && matchesStatus;
            });

            renderReportsList(filtered);
        };

        // Defer load by 1 frame to ensure DOM registration is complete
        setTimeout(loadReports, 0);
    })();
</script>
