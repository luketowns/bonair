<div class="mb-6">
    <a href="#/safety" class="inline-flex items-center text-sm font-semibold text-slate-400 hover:text-aviationRed transition-colors group">
        <i class="fa-solid fa-arrow-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i>
        Back to Safety Hub
    </a>
</div>

<div class="mb-8">
    <span class="bg-red-500/10 text-aviationRed border border-red-500/20 text-xs font-bold uppercase tracking-wider px-3 py-1 rounded-full">New Submission</span>
    <h1 class="text-3xl font-extrabold text-white tracking-tight mt-3">Submit Safety Report</h1>
    <p class="text-slate-400 mt-1">File operational hazards, flight safety incidents, or maintenance risks immediately to flight ops.</p>
</div>

<div class="bg-aviationCard rounded-xl border border-aviationBorder p-6 md:p-8 shadow-xl max-w-3xl">
    <form id="smsForm" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="eventDate" class="block text-sm font-bold text-slate-300 uppercase tracking-wider mb-2">
                    Date of Event <span class="text-aviationRed">*</span>
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none">
                        <i class="fa-regular fa-calendar"></i>
                    </span>
                    <input type="date" id="eventDate" required
                        class="bg-slate-900 border border-aviationBorder text-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-aviationRed focus:border-transparent block w-full pl-10 p-3 transition-all">
                </div>
                <p class="text-xs text-slate-500 mt-1.5">Format: DD-MM-YYYY</p>
            </div>

            <div>
                <label for="location" class="block text-sm font-bold text-slate-300 uppercase tracking-wider mb-2">
                    Location / Base <span class="text-aviationRed">*</span>
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <input type="text" id="location" required placeholder="e.g. YKA Kamloops, In-Flight"
                        class="bg-slate-900 border border-aviationBorder text-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-aviationRed focus:border-transparent block w-full pl-10 p-3 placeholder-slate-600 transition-all">
                </div>
                <p class="text-xs text-slate-500 mt-1.5">Enter base airport code or coordinates.</p>
            </div>
        </div>

        <div>
            <label for="personnel" class="block text-sm font-bold text-slate-300 uppercase tracking-wider mb-2">
                Personnel Involved
            </label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none">
                    <i class="fa-solid fa-users-gear"></i>
                </span>
                <input type="text" id="personnel" placeholder="e.g. Pilot in Command, Co-Pilot, Crew Chief"
                    class="bg-slate-900 border border-aviationBorder text-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-aviationRed focus:border-transparent block w-full pl-10 p-3 placeholder-slate-600 transition-all">
            </div>
            <p class="text-xs text-slate-500 mt-1.5">Optional. List any flight crew, engineers, or dispatchers involved.</p>
        </div>

        <div>
            <label for="observation" class="block text-sm font-bold text-slate-300 uppercase tracking-wider mb-2">
                Observation Details <span class="text-aviationRed">*</span>
            </label>
            <textarea id="observation" required rows="6" placeholder="Provide a detailed description of the observed hazard, sequence of events, and any corrective actions taken in the cockpit..."
                class="bg-slate-900 border border-aviationBorder text-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-aviationRed focus:border-transparent block w-full p-4 placeholder-slate-600 transition-all resize-y"></textarea>
        </div>

        <div>
            <label class="block text-sm font-bold text-slate-300 uppercase tracking-wider mb-2 font-mono">
                Attachments
            </label>
            <div class="border-2 border-dashed border-aviationBorder hover:border-aviationRed/50 rounded-xl bg-slate-900/50 p-6 text-center cursor-pointer transition-colors group">
                <input type="file" id="fileAttachment" class="hidden">
                <label for="fileAttachment" class="cursor-pointer">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-500 group-hover:text-aviationRed transition-colors mb-2 block"></i>
                    <span class="text-sm font-semibold text-slate-300 block">Click to upload or drag files here</span>
                    <span class="text-xs text-slate-500 block mt-1">Maximum file size: 50 MB (Images, Video, Flight Logs)</span>
                </label>
            </div>
        </div>

        <div class="pt-4 border-t border-aviationBorder flex flex-col sm:flex-row sm:justify-end gap-3">
            <a href="#/safety" class="px-5 py-3 rounded-lg border border-aviationBorder text-slate-400 hover:text-white hover:bg-slate-800 font-semibold text-center text-sm transition-colors">
                Cancel
            </a>
            <button type="submit" class="px-6 py-3 rounded-lg bg-aviationRed hover:bg-rose-700 text-white font-bold text-center text-sm shadow-md shadow-rose-950/20 transition-colors flex items-center justify-center">
                <i class="fa-solid fa-paper-plane mr-2"></i> Submit Report
            </button>
        </div>

    </form>
</div>

<script>
    // Set the input date value automatically to today's date
    document.getElementById('eventDate').valueAsDate = new Date();
</script>
